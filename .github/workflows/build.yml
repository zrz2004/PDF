name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows x64
            os: windows-latest
            args: "--win nsis zip"
            artifact-glob: "release/*.exe,release/*.zip"
          - name: macOS Intel
            os: macos-13
            args: "--mac dmg zip --x64"
            artifact-glob: "release/*.dmg,release/*-mac*.zip"
          - name: macOS Apple Silicon
            os: macos-latest
            args: "--mac dmg zip --arm64"
            artifact-glob: "release/*.dmg,release/*-mac*.zip"
          - name: Linux x64
            os: ubuntu-latest
            args: "--linux AppImage deb"
            artifact-glob: "release/*.AppImage,release/*.deb"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Linux needs these native libs for electron-builder/chromium packaging
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xauth xvfb libgbm1 libasound2t64 || true

      - name: Type check
        run: npm run typecheck

      - name: Build renderer
        run: npm run icon:generate && npm run build

      - name: Build desktop package
        # --publish never: never let electron-builder auto-publish; we attach
      # artifacts explicitly in the release job below.
        env:
          GH_TOKEN: ""
        run: npx electron-builder ${{ matrix.config.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalPDF-Studio-${{ matrix.config.name }}
          path: ${{ matrix.config.artifact-glob }}
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) -exec cp -v {} release-assets/ \;
          echo "Assets collected:" && ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * | tee ../checksums-mac-linux.txt

      - name: Attach macOS/Linux assets to the release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            release-assets/*
            checksums-mac-linux.txt
          draft: false
          fail_on_unmatched_files: false
